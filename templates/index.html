
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>札幌ヒグマ出没マップ 2025-2026</title>
  <meta name="description" content="札幌市のヒグマ出没情報を地図、統計、一覧で確認できるレスポンシブマップです。">
  <meta property="og:title" content="札幌ヒグマ出没マップ 2025-2026">
  <meta property="og:description" content="札幌市のヒグマ出没情報を地図、統計、一覧で確認。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/static/ogp.png">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b0e;
      --panel: rgba(17, 22, 27, .92);
      --panel-strong: #11161b;
      --line: rgba(255, 255, 255, .12);
      --line-strong: rgba(255, 255, 255, .2);
      --text: #eef2f4;
      --muted: #97a3ad;
      --soft: #c7d0d6;
      --accent: #ff7a45;
      --accent-2: #34d0ba;
      --warning: #ffd166;
      --danger: #ff5d6c;
      --blue: #65a9ff;
      --violet: #c58cff;
      --shadow: 0 18px 60px rgba(0, 0, 0, .42);
      --radius: 8px;
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 392px;
      grid-template-rows: 72px minmax(0, 1fr);
      min-height: 100dvh;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 12px 18px;
      background: rgba(9, 12, 15, .9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      z-index: 20;
    }

    .brand {
      min-width: 230px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #26333a, #151b20);
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 1px rgba(255,255,255,.08);
    }

    .brand-mark svg { width: 25px; height: 25px; stroke: var(--accent); }
    h1 { margin: 0; font-size: 18px; line-height: 1.15; letter-spacing: 0; }
    .subtitle { margin-top: 4px; color: var(--muted); font-size: 12px; }

    .quick-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(86px, 1fr));
      gap: 8px;
      width: 100%;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
    }

    .profile-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: rgba(255,255,255,.045);
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      transition: .16s ease;
    }

    .profile-link:hover {
      border-color: var(--line-strong);
      background: rgba(255, 122, 69, .14);
      transform: translateY(-1px);
    }

    .language-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
    }

    .lang-btn {
      min-width: 42px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .lang-btn.active {
      color: var(--text);
      background: rgba(255, 122, 69, .2);
    }

    .stat-pill {
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .045);
    }

    .stat-value {
      display: block;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    #map { position: absolute; inset: 0; background: #101820; }

    .map-tools {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 500;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: calc(100% - 32px);
    }

    .icon-btn, .text-btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 22, 27, .88);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .16s ease;
      backdrop-filter: blur(14px);
    }

    .icon-btn {
      width: 42px;
      display: grid;
      place-items: center;
    }

    .text-btn { padding: 0 12px; font-weight: 700; }
    .icon-btn:hover, .text-btn:hover { border-color: var(--line-strong); transform: translateY(-1px); }
    .icon-btn.active, .text-btn.active { border-color: rgba(255, 122, 69, .7); color: #fff; background: rgba(255, 122, 69, .18); }
    .icon-btn svg { width: 19px; height: 19px; }

    .panel {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      min-height: 0;
      background: var(--panel-strong);
      border-left: 1px solid var(--line);
      z-index: 10;
    }

    .search-area {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .searchbox {
      position: relative;
    }

    .searchbox svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .searchbox input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: 0;
      color: var(--text);
      background: rgba(255, 255, 255, .055);
    }

    .searchbox input:focus { border-color: rgba(52, 208, 186, .65); }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      height: 36px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }

    .tab.active {
      color: var(--text);
      border-color: var(--line);
      background: rgba(255,255,255,.06);
    }

    .panel-scroll {
      overflow: auto;
      min-height: 0;
      padding: 16px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .section { margin-bottom: 22px; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--soft);
      font-size: 12px;
      font-weight: 800;
    }

    .section-title span:last-child { color: var(--muted); font-weight: 600; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      max-width: 100%;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.035);
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .chip.active {
      color: var(--text);
      border-color: rgba(52, 208, 186, .55);
      background: rgba(52, 208, 186, .12);
    }

    .dot { width: 8px; height: 8px; border-radius: 999px; flex: 0 0 auto; }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .panel-button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.045);
      cursor: pointer;
      font-weight: 700;
    }

    .bars { display: grid; gap: 9px; }
    .bar-row {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr) 38px;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .incident-list {
      display: grid;
      gap: 8px;
    }

    .incident {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.045);
      cursor: pointer;
      transition: .16s ease;
    }

    .incident:hover { border-color: var(--line-strong); transform: translateY(-1px); }

    .incident-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 3px 8px;
      color: #101316;
      background: var(--accent);
      font-size: 11px;
      font-weight: 800;
    }

    .incident-place {
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
    }

    .incident-status {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .about {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
    }

    .legend {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--soft);
      font-size: 13px;
    }

    .leaflet-control-zoom a {
      background: rgba(17, 22, 27, .92) !important;
      color: var(--text) !important;
      border-color: var(--line) !important;
    }

    .leaflet-popup-content-wrapper {
      color: var(--text);
      background: #12171c;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .leaflet-popup-tip { background: #12171c; }
    .popup { min-width: 220px; }
    .popup-date { color: var(--muted); font-size: 12px; }
    .popup-place { margin: 6px 0; font-weight: 800; line-height: 1.45; }
    .popup-status { color: var(--muted); font-size: 12px; line-height: 1.5; }

    .loading {
      position: absolute;
      inset: 0;
      z-index: 800;
      display: grid;
      place-items: center;
      background: rgba(9, 11, 14, .72);
      color: var(--muted);
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 52dvh auto;
        min-height: 100dvh;
      }
      .topbar {
        position: sticky;
        top: 0;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 12px;
      }
      .quick-stats { grid-column: 1 / -1; }
      .brand { min-width: 0; }
      .quick-stats { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .stat-pill { padding: 7px 8px; }
      .stat-value { font-size: 16px; }
      .stat-label { font-size: 10px; }
      .map-wrap { min-height: 52dvh; }
      #map { position: absolute; }
      .panel {
        border-left: 0;
        border-top: 1px solid var(--line);
        min-height: 48dvh;
      }
      .panel-scroll { max-height: none; }
    }

    @media (max-width: 560px) {
      h1 { font-size: 16px; }
      .subtitle { font-size: 11px; }
      .brand-mark { width: 38px; height: 38px; }
      .quick-stats { grid-template-columns: repeat(2, 1fr); }
      .top-actions { gap: 6px; }
      .profile-link { min-height: 36px; padding: 0 10px; font-size: 11px; }
      .lang-btn { min-width: 38px; }
      .app { grid-template-rows: auto 48dvh auto; }
      .map-wrap { min-height: 48dvh; }
      .tabs, .search-area, .panel-scroll { padding-left: 12px; padding-right: 12px; }
      .tab { font-size: 12px; }
      .bar-row { grid-template-columns: 58px minmax(0, 1fr) 34px; }
      .map-tools { left: 10px; bottom: 10px; }
      .text-btn { padding: 0 10px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 17c1.4-4.8 4-7.2 7-7.2s5.6 2.4 7 7.2"></path>
            <path d="M8.5 10.4 7 7.8 9.8 8"></path>
            <path d="M15.5 10.4 17 7.8 14.2 8"></path>
            <path d="M9.5 15.4h.01"></path>
            <path d="M14.5 15.4h.01"></path>
            <path d="M11 18h2"></path>
          </svg>
        </div>
        <div>
          <h1 id="app-title">札幌ヒグマ出没マップ</h1>
          <div class="subtitle" id="app-subtitle">2025-2026 / 公式公開データを可視化</div>
        </div>
      </div>
      <div class="quick-stats" aria-label="概要">
        <div class="stat-pill"><span class="stat-value" id="total-count">0</span><span class="stat-label" id="label-total">総件数</span></div>
        <div class="stat-pill"><span class="stat-value" id="visible-count">0</span><span class="stat-label" id="label-visible">表示中</span></div>
        <div class="stat-pill"><span class="stat-value" id="hot-ward">-</span><span class="stat-label" id="label-hot">最多エリア</span></div>
        <div class="stat-pill"><span class="stat-value" id="latest-date">-</span><span class="stat-label" id="label-latest">最新日</span></div>
      </div>
      <div class="top-actions" aria-label="関連リンクと言語切替">

        <div class="language-toggle">
          <button class="lang-btn active" id="lang-ja" type="button" data-lang="ja">JP</button>
          <button class="lang-btn" id="lang-en" type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <section class="map-wrap" aria-label="地図" id="map-section">
      <div id="map"></div>
      <div class="loading" id="loading">データを読み込んでいます</div>
      <div class="map-tools">
        <button class="icon-btn active" id="toggle-points" type="button" title="地点を表示/非表示" aria-label="地点を表示/非表示">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-4.6 7-11a7 7 0 1 0-14 0c0 6.4 7 11 7 11z"></path><circle cx="12" cy="10" r="2.5"></circle></svg>
        </button>
        <button class="icon-btn active" id="toggle-heat" type="button" title="ヒートマップを表示/非表示" aria-label="ヒートマップを表示/非表示">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c3.3 0 6-2.5 6-5.8 0-3.8-3.2-6-4.4-9.2-.2-.6-1.1-.6-1.4 0-.7 1.7-2.2 3.2-3.5 4.8C7.4 13.4 6 15 6 17.2 6 20.1 8.5 22 12 22z"></path></svg>
        </button>
        <button class="text-btn" id="fit-map" type="button">全体表示</button>
      </div>
    </section>

    <aside class="panel" aria-label="操作パネル">
      <div class="search-area">
        <label class="searchbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="search" type="search" placeholder="場所・状況・区で検索">
        </label>
      </div>
      <nav class="tabs" aria-label="表示切替">
        <button class="tab active" id="tab-filters" type="button" data-view="filters">絞り込み</button>
        <button class="tab" id="tab-stats" type="button" data-view="stats">分析</button>
        <button class="tab" id="tab-list" type="button" data-view="list">一覧</button>
      </nav>
      <div class="panel-scroll">
        <section class="view active" id="view-filters">
          <div class="section">
            <div class="section-title"><strong id="section-ward">区</strong><span id="ward-summary"></span></div>
            <div class="chips" id="ward-chips"></div>
          </div>
          <div class="section">
            <div class="section-title"><strong id="section-month">月</strong><span id="month-summary"></span></div>
            <div class="chips" id="month-chips"></div>
          </div>
          <div class="section">
            <div class="section-title"><strong id="section-category">分類</strong></div>
            <div class="chips" id="category-chips"></div>
          </div>
          <div class="action-row">
            <button class="panel-button" id="select-all" type="button">すべて選択</button>
            <button class="panel-button" id="clear-all" type="button">クリア</button>
          </div>
          <div class="about" id="help-text" style="margin-top:18px">
            地図上の点を押すと詳細を表示します。一覧の項目を押すと、その地点へ移動します。
          </div>
        </section>

        <section class="view" id="view-stats">
          <div class="section">
            <div class="section-title"><strong id="section-month-bars">月別件数</strong></div>
            <div class="bars" id="month-bars"></div>
          </div>
          <div class="section">
            <div class="section-title"><strong id="section-ward-bars">区別件数</strong></div>
            <div class="bars" id="ward-bars"></div>
          </div>
          <div class="section">
            <div class="section-title"><strong id="section-legend">凡例</strong></div>
            <div class="legend" id="legend"></div>
          </div>
        </section>

        <section class="view" id="view-list">
          <div class="list-head">
            <strong id="list-count">0件</strong>
            <span id="sort-label">新しい順</span>
          </div>
          <div class="incident-list" id="incident-list"></div>
        </section>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

        loading: "Loading data",
        pointsToggle: "Show/hide points",
        heatToggle: "Show/hide heatmap",
        fitMap: "Fit Map",
        search: "Search place, status, or ward",
        filters: "Filters",
        stats: "Stats",
        list: "List",
        ward: "Ward",
        month: "Month",
        category: "Type",
        selectAll: "Select All",
        clear: "Clear",
        help: "Tap a point on the map to view details. Tap an item in the list to move to that location.",
        monthly: "By Month",
        byWard: "By Ward",
        legend: "Legend",
        newest: "Newest First",
        standard: "Standard",
        aerial: "Aerial",
        noData: "No matching data.",
        fetchError: "Failed to load data",
        countSuffix: " results",
        wardSuffix: " wards",
        monthSuffix: " months",
        monthName: month => `${month}`,
        hotWardValue: ward => ward,
        categories: {
          sighting: "Sighting",
          family: "Group / Family",
          trace: "Trace",
          captured: "Captured / Culled",
          injury: "Injury"
        }
      }
    };

    const categoryMeta = {
      sighting: { color: "#ff7a45" },
      family: { color: "#ffd166" },
      trace: { color: "#65a9ff" },
      captured: { color: "#ff5d6c" },
      injury: { color: "#c58cff" }
    };

    const state = {
      points: [],
      filtered: [],
      wards: new Set(),
      months: new Set(),
      categories: new Set(Object.keys(categoryMeta)),
      search: "",
      showPoints: true,
      showHeat: true,
      lang: localStorage.getItem("bear-map-lang") || "ja",
      filtersBuilt: false
    };

    const els = {
      title: document.getElementById("app-title"),
      subtitle: document.getElementById("app-subtitle"),
      labelTotal: document.getElementById("label-total"),
      labelVisible: document.getElementById("label-visible"),
      labelHot: document.getElementById("label-hot"),
      labelLatest: document.getElementById("label-latest"),
      loading: document.getElementById("loading"),
      search: document.getElementById("search"),
      wardChips: document.getElementById("ward-chips"),
      monthChips: document.getElementById("month-chips"),
      categoryChips: document.getElementById("category-chips"),
      wardSummary: document.getElementById("ward-summary"),
      monthSummary: document.getElementById("month-summary"),
      totalCount: document.getElementById("total-count"),
      visibleCount: document.getElementById("visible-count"),
      hotWard: document.getElementById("hot-ward"),
      latestDate: document.getElementById("latest-date"),
      monthBars: document.getElementById("month-bars"),
      wardBars: document.getElementById("ward-bars"),
      legend: document.getElementById("legend"),
      listCount: document.getElementById("list-count"),
      incidentList: document.getElementById("incident-list")
    };

    const map = L.map("map", { zoomControl: false, minZoom: 9 }).setView([43.045, 141.32], 11);
    window.bearMap = map;
    map.on("moveend zoomend", updateMapState);
    L.control.zoom({ position: "topright" }).addTo(map);
    const standard = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);
    const satellite = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19,
      attribution: "Tiles &copy; Esri"
    });
    let layerControl = L.control.layers({ "標準": standard, "航空写真": satellite }, null, { position: "topright" }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    let heatLayer = null;
    const SAPPORO_BOUNDS = [[42.82, 141.02], [43.22, 141.58]];

    function tr(key) {
      return I18N[state.lang][key];
    }

    function categoryLabel(key) {
      return I18N[state.lang].categories[key] || key;
    }

    function refreshLayerControl() {
      if (layerControl) map.removeControl(layerControl);
      layerControl = L.control.layers(
        { [tr("standard")]: standard, [tr("aerial")]: satellite },
        null,
        { position: "topright" }
      ).addTo(map);
    }

    function updateMapState() {
      const center = map.getCenter();
      document.body.dataset.mapCenter = `${center.lat.toFixed(5)},${center.lng.toFixed(5)}`;
      document.body.dataset.mapZoom = String(map.getZoom());
    }

    function monthOf(dateText) {
      const match = String(dateText).match(/[/-](\d{1,2})[/-]/);
      return match ? Number(match[1]) : null;
    }

    function parseDateValue(point) {
      const parts = String(point.date).split(/[/-]/).map(Number);
      if (parts.length < 3 || parts.some(Number.isNaN)) return 0;
      return new Date(parts[0], parts[1] - 1, parts[2]).getTime();
    }

    function countBy(items, keyFn) {
      return items.reduce((acc, item) => {
        const key = keyFn(item);
        if (key) acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function makeChip(label, active, onClick, color) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `chip${active ? " active" : ""}`;
      button.innerHTML = `${color ? `<span class="dot" style="background:${color}"></span>` : ""}<span>${label}</span>`;
      button.addEventListener("click", onClick);
      return button;
    }

    function buildFilters() {
      const wards = [...new Set(state.points.map(p => p.ward).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
      const months = [...new Set(state.points.map(p => monthOf(p.date)).filter(Boolean))].sort((a, b) => a - b);
      if (!state.filtersBuilt) {
        state.wards = new Set(wards);
        state.months = new Set(months);
      }

      els.wardChips.innerHTML = "";
      wards.forEach(ward => {
        els.wardChips.appendChild(makeChip(ward, state.wards.has(ward), event => {
          toggleSet(state.wards, ward);
          event.currentTarget.classList.toggle("active");
          applyFilters();
        }));
      });

      els.monthChips.innerHTML = "";
      months.forEach(month => {
        els.monthChips.appendChild(makeChip(tr("monthName")(month), state.months.has(month), event => {
          toggleSet(state.months, month);
          event.currentTarget.classList.toggle("active");
          applyFilters();
        }));
      });

      els.categoryChips.innerHTML = "";
      Object.entries(categoryMeta).forEach(([key, meta]) => {
        els.categoryChips.appendChild(makeChip(categoryLabel(key), state.categories.has(key), event => {
          toggleSet(state.categories, key);
          event.currentTarget.classList.toggle("active");
          applyFilters();
        }, meta.color));
      });

      els.legend.innerHTML = Object.entries(categoryMeta).map(([key, meta]) => `
        <div class="legend-item"><span class="dot" style="background:${meta.color}"></span><span>${categoryLabel(key)}</span></div>
      `).join("");
      state.filtersBuilt = true;
    }

    function toggleSet(set, value) {
      set.has(value) ? set.delete(value) : set.add(value);
    }

    function applyFilters() {
      const query = state.search.trim().toLowerCase();
      state.filtered = state.points.filter(point => {
        const month = monthOf(point.date);
        const haystack = `${point.place} ${point.status} ${point.ward}`.toLowerCase();
        return state.wards.has(point.ward)
          && (!month || state.months.has(month))
          && state.categories.has(point.category)
          && (!query || haystack.includes(query));
      });

      renderMap();
      renderStats();
      renderList();
      renderHeader();
    }

    function renderMap() {
      markerLayer.clearLayers();
      if (heatLayer) {
        map.removeLayer(heatLayer);
        heatLayer = null;
      }

      const heatPoints = [];
      state.filtered.forEach(point => {
        const meta = categoryMeta[point.category] || categoryMeta.sighting;
        const label = categoryLabel(point.category);
        heatPoints.push([point.lat, point.lng, point.category === "injury" ? 1 : .68]);
        if (!state.showPoints) return;

        const marker = L.circleMarker([point.lat, point.lng], {
          radius: point.category === "injury" || point.category === "captured" ? 8 : 6,
          color: "rgba(5, 8, 10, .75)",
          weight: 2,
          fillColor: meta.color,
          fillOpacity: .92
        });
        marker.bindPopup(`
          <div class="popup">
            <div class="popup-date">${point.date} ${point.time || ""} / ${point.ward}</div>
            <div class="popup-place">${point.place}</div>
            <div><span class="badge" style="background:${meta.color}">${label}</span></div>
            <div class="popup-status">${point.status}</div>
          </div>
        `);
        markerLayer.addLayer(marker);
      });

      if (state.showHeat && heatPoints.length && L.heatLayer) {
        heatLayer = L.heatLayer(heatPoints, {
          radius: 28,
          blur: 22,
          minOpacity: .26,
          gradient: { .25: "#65a9ff", .5: "#34d0ba", .72: "#ffd166", 1: "#ff5d6c" }
        }).addTo(map);
      }
    }

    function renderHeader() {
      const wardCounts = countBy(state.filtered, p => p.ward);
      const topWard = Object.entries(wardCounts).sort((a, b) => b[1] - a[1])[0];
      const latest = [...state.filtered].sort((a, b) => parseDateValue(b) - parseDateValue(a))[0];

      els.totalCount.textContent = state.points.length;
      els.visibleCount.textContent = state.filtered.length;
      els.hotWard.textContent = topWard ? tr("hotWardValue")(topWard[0]) : "-";
      els.latestDate.textContent = latest ? latest.date.replace(/^20\d{2}\//, "") : "-";
      els.wardSummary.textContent = `${state.wards.size}${tr("wardSuffix")}`;
      els.monthSummary.textContent = `${state.months.size}${tr("monthSuffix")}`;
    }

    function renderStats() {
      renderBars(els.monthBars, countBy(state.filtered, p => monthOf(p.date) ? tr("monthName")(monthOf(p.date)) : ""), (a, b) => Number(a[0].replace(/\D/g, "")) - Number(b[0].replace(/\D/g, "")));
      renderBars(els.wardBars, countBy(state.filtered, p => p.ward), (a, b) => b[1] - a[1]);
    }

    function renderBars(container, counts, sorter) {
      const entries = Object.entries(counts).sort(sorter);
      const max = Math.max(1, ...entries.map(([, value]) => value));
      container.innerHTML = entries.length ? entries.map(([label, value]) => `
        <div class="bar-row">
          <span>${label}</span>
          <span class="bar-track"><span class="bar-fill" style="display:block;width:${(value / max) * 100}%"></span></span>
          <strong>${value}</strong>
        </div>
      `).join("") : `<div class="about">${tr("noData")}</div>`;
    }

    function renderList() {
      const sorted = [...state.filtered].sort((a, b) => parseDateValue(b) - parseDateValue(a));
      els.listCount.textContent = `${sorted.length}${tr("countSuffix")}`;
      els.incidentList.innerHTML = sorted.slice(0, 120).map(point => {
        const meta = categoryMeta[point.category] || categoryMeta.sighting;
        const label = categoryLabel(point.category);
        return `
          <article class="incident" data-id="${point.id}">
            <div class="incident-top">
              <span>${point.date} ${point.time || ""} / ${point.ward}</span>
              <span class="badge" style="background:${meta.color}">${label}</span>
            </div>
            <div class="incident-place">${point.place}</div>
            <div class="incident-status">${point.status}</div>
          </article>
        `;
      }).join("") || `<div class="about">${tr("noData")}</div>`;

      els.incidentList.querySelectorAll(".incident").forEach(card => {
        card.addEventListener("click", () => {
          const point = state.filtered.find(item => String(item.id) === card.dataset.id);
          if (!point) return;
          map.setView([point.lat, point.lng], 15);
          markerLayer.eachLayer(layer => {
            const latlng = layer.getLatLng && layer.getLatLng();
            if (latlng && Math.abs(latlng.lat - point.lat) < .000001 && Math.abs(latlng.lng - point.lng) < .000001) {
              layer.openPopup();
            }
          });
          if (window.matchMedia("(max-width: 980px)").matches) {
            document.querySelector(".map-wrap").scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      });
    }

    function fitToData() {
      map.fitBounds(SAPPORO_BOUNDS, { padding: [26, 26], maxZoom: 12 });
      window.setTimeout(updateMapState, 250);
    }

    function applyLanguage() {
      document.documentElement.lang = state.lang;
      document.title = tr("documentTitle");
      const description = document.querySelector('meta[name="description"]');
      const ogTitle = document.querySelector('meta[property="og:title"]');
      const ogDescription = document.querySelector('meta[property="og:description"]');
      if (description) description.content = tr("metaDescription");
      if (ogTitle) ogTitle.content = tr("documentTitle");
      if (ogDescription) ogDescription.content = tr("metaDescription");

      els.title.textContent = tr("appTitle");
      els.subtitle.textContent = tr("subtitle");
      els.labelTotal.textContent = tr("total");
      els.labelVisible.textContent = tr("visible");
      els.labelHot.textContent = tr("hotWard");
      els.labelLatest.textContent = tr("latest");
      els.loading.textContent = tr("loading");
      els.search.placeholder = tr("search");

      document.getElementById("toggle-points").title = tr("pointsToggle");
      document.getElementById("toggle-points").setAttribute("aria-label", tr("pointsToggle"));
      document.getElementById("toggle-heat").title = tr("heatToggle");
      document.getElementById("toggle-heat").setAttribute("aria-label", tr("heatToggle"));
      document.getElementById("fit-map").textContent = tr("fitMap");
      document.getElementById("tab-filters").textContent = tr("filters");
      document.getElementById("tab-stats").textContent = tr("stats");
      document.getElementById("tab-list").textContent = tr("list");
      document.getElementById("section-ward").textContent = tr("ward");
      document.getElementById("section-month").textContent = tr("month");
      document.getElementById("section-category").textContent = tr("category");
      document.getElementById("select-all").textContent = tr("selectAll");
      document.getElementById("clear-all").textContent = tr("clear");
      document.getElementById("help-text").textContent = tr("help");
      document.getElementById("section-month-bars").textContent = tr("monthly");
      document.getElementById("section-ward-bars").textContent = tr("byWard");
      document.getElementById("section-legend").textContent = tr("legend");
      document.getElementById("sort-label").textContent = tr("newest");

      document.querySelectorAll(".lang-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.lang === state.lang);
      });
      refreshLayerControl();
      if (state.points.length) {
        buildFilters();
        applyFilters();
      }
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
        document.querySelectorAll(".view").forEach(item => item.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(`view-${tab.dataset.view}`).classList.add("active");
      });
    });

    document.querySelectorAll(".lang-btn").forEach(button => {
      button.addEventListener("click", () => {
        state.lang = button.dataset.lang;
        localStorage.setItem("bear-map-lang", state.lang);
        applyLanguage();
      });
    });

    els.search.addEventListener("input", event => {
      state.search = event.target.value;
      applyFilters();
    });

    document.getElementById("toggle-points").addEventListener("click", event => {
      state.showPoints = !state.showPoints;
      event.currentTarget.classList.toggle("active", state.showPoints);
      renderMap();
    });

    document.getElementById("toggle-heat").addEventListener("click", event => {
      state.showHeat = !state.showHeat;
      event.currentTarget.classList.toggle("active", state.showHeat);
      renderMap();
    });

    document.getElementById("fit-map").addEventListener("click", fitToData);

    document.getElementById("select-all").addEventListener("click", () => {
      state.wards = new Set(state.points.map(p => p.ward).filter(Boolean));
      state.months = new Set(state.points.map(p => monthOf(p.date)).filter(Boolean));
      state.categories = new Set(Object.keys(categoryMeta));
      document.querySelectorAll(".chip").forEach(chip => chip.classList.add("active"));
      applyFilters();
    });

    document.getElementById("clear-all").addEventListener("click", () => {
      state.wards.clear();
      state.months.clear();
      state.categories.clear();
      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));
      applyFilters();
    });

    applyLanguage();

    fetch("/api/points")
      .then(response => {
        if (!response.ok) throw new Error(tr("fetchError"));
        return response.json();
      })
      .then(data => {
        state.points = data.points || [];
        buildFilters();
        applyFilters();
        fitToData();
      })
      .catch(error => {
        els.loading.textContent = error.message;
      })
      .finally(() => {
        if (state.points.length) els.loading.style.display = "none";
      });
  </script>
</body>
</html>
